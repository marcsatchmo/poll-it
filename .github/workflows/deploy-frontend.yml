name: Deploy Frontend a Azure Static Web Apps

# Se ejecuta cuando hay push a la rama main con cambios en el frontend o código compartido
on:
  push:
    branches:
      - main
    paths:
      - 'Poll-it.Client/**'
      - 'Poll-it.Shared/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'Poll-it.Client/**'
      - 'Poll-it.Shared/**'

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    
    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout código del repositorio
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # 2. Configurar .NET SDK
      # IMPORTANTE: Asegúrate de que la versión aquí coincida con tu csproj
      # (típicamente algo como net8.0 o net7.0)
      - name: Configurar .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0' # Cambia esto si tu proyecto usa otra versión

      # 3. Restaurar dependencias NuGet para el cliente Blazor WASM
      - name: Restaurar dependencias del cliente
        run: dotnet restore Poll-it.Client/Poll-it.Client.csproj

      # 4. Compilar el proyecto cliente
      - name: Compilar proyecto cliente
        run: dotnet build Poll-it.Client/Poll-it.Client.csproj --configuration Release --no-restore

      # 5. Publicar el proyecto Blazor WebAssembly
      # Esto genera los archivos estáticos en wwwroot para servir en Static Web Apps
      - name: Publicar proyecto cliente
        run: dotnet publish Poll-it.Client/Poll-it.Client.csproj --configuration Release --no-build --output ./publish

      # 6. Desplegar a Azure Static Web Apps
      # IMPORTANTE: Azure Static Web Apps requiere un token de despliegue (AZURE_STATIC_WEB_APPS_API_TOKEN)
      # Ver instrucciones en la documentación de Azure Portal setup
      - name: Desplegar a Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # CONFIGURABLE: Reemplaza con el nombre de tu recurso Static Web Apps en Azure
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          
          # Acción a ejecutar: upload (para push a main) o close (para cerrar PR)
          action: 'upload'
          
          # Ubicación del proyecto Blazor WebAssembly en el repositorio
          app_location: 'Poll-it.Client/publish/wwwroot'
          
          # Ubicación de salida (para Static Web Apps, ya está en publish/wwwroot)
          output_location: ''
          
          # No tenemos API integrada en Static Web Apps (el backend está en App Service)
          api_location: ''

      # 7. Notificación de éxito (opcional)
      - name: ✅ Despliegue completado exitosamente
        if: success()
        run: echo "Frontend desplegado correctamente a Azure Static Web Apps"

      # 8. Notificación de error (opcional)
      - name: ❌ Error en el despliegue
        if: failure()
        run: echo "Falló el despliegue del frontend. Revisa los logs anteriores."

  # Job para limpiar entornos de preview cuando se cierran PRs
  close-pull-request-job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    
    steps:
      - name: Cerrar entorno de preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
