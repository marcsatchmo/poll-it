name: Deploy Frontend a Azure Static Web Apps

# Se ejecuta cuando hay push a la rama master con cambios en el frontend o código compartido
on:
  push:
    branches:
      - master
    paths:
      - 'Poll-it.Client/**'
      - 'Poll-it.Shared/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
    paths:
      - 'Poll-it.Client/**'
      - 'Poll-it.Shared/**'

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout código del repositorio
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # 2. Desplegar a Azure Static Web Apps
      #
      # PROBLEMA RAÍZ DE LA CONFIGURACIÓN ANTERIOR:
      # Usar 'dotnet publish' manualmente y luego apuntar a 'publish/wwwroot' con
      # skip_app_build:true fallaba porque Azure/static-web-apps-deploy@v1 ejecuta
      # Oryx en un contenedor que tiene su propio directorio de trabajo. Las rutas
      # relativas generadas por pasos anteriores del runner (./publish) no son
      # accesibles desde dentro de ese contenedor.
      #
      # SOLUCIÓN:
      # Dejar que la acción maneje el build completamente. Oryx detecta automáticamente
      # proyectos Blazor WASM, instala .NET y ejecuta dotnet publish internamente.
      # app_location apunta al directorio del .csproj del cliente.
      # output_location le indica a Oryx dónde buscar los archivos estáticos generados.
      - name: Desplegar a Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'

          # Directorio del proyecto Blazor WASM (donde está el .csproj)
          app_location: 'Poll-it.Client'

          # Oryx publica Blazor WASM en bin/Release/net*/publish/wwwroot
          # output_location es relativo a app_location dentro del publish output
          output_location: 'wwwroot'

          # No hay API integrada en Static Web Apps (el backend está en App Service separado)
          api_location: ''

      # 3. Notificación de resultado
      - name: ✅ Despliegue completado exitosamente
        if: success()
        run: echo "Frontend desplegado correctamente a Azure Static Web Apps"

      - name: ❌ Error en el despliegue
        if: failure()
        run: echo "Falló el despliegue del frontend. Revisa los logs anteriores."

  # Job para limpiar entornos de preview cuando se cierran PRs
  close-pull-request-job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Cerrar entorno de preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'close'
          app_location: 'Poll-it.Client'
